<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ATELIER · imaging</title>
<link rel="stylesheet" href="theme.css" onerror="">
<style>
  :root { --primary:#C85A20; --ink:#3D342E; --ink-muted:#5A4D43; --ink-faint:#8A8078; --hairline:#E0E0E0; --paper:#FFFFFF; --font-figures:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0E0D0C; color:#EDE7E1; font-family:var(--font-figures); min-height:100vh;
         display:flex; flex-direction:column; align-items:center; padding:32px 24px 80px; }
  .title { color:#EDE7E1; font-size:15px; font-weight:600; margin-bottom:4px; align-self:flex-start; }
  .sub { color:#9A8F86; font-size:12px; margin-bottom:18px; align-self:flex-start; }
  .frame { background:#000; border-radius:10px; overflow:hidden; box-shadow:0 10px 50px rgba(0,0,0,.5); }
  canvas { display:block; width:880px; height:520px; }
  .toolbar { margin-top:18px; display:flex; gap:10px; flex-wrap:wrap; }
  button, select { font-family:var(--font-figures); font-size:13px; font-weight:600; border:1px solid #2A2724;
           background:#1A1816; color:#EDE7E1; padding:9px 14px; border-radius:8px; cursor:pointer; }
  .hint { margin-top:14px; color:#9A8F86; font-size:12px; max-width:60ch; }
</style>
</head>
<body>
<div class="title">PET / CT render</div>
<div class="sub" id="sub">niivue · house preset</div>
<div class="frame"><canvas id="gl"></canvas></div>
<div class="toolbar">
  <select id="mode"><option value="mip">MIP</option><option value="multi">Ortho slices</option><option value="render">3D render</option></select>
  <button id="dl">Download PNG</button>
</div>
<div class="hint" id="hint">Pass volumes via URL: <code>?ct=CT.nii.gz&pet=PET.nii.gz</code> (PET overlaid hot, CT greyscale).
Without volumes this shows the configured viewer chrome.</div>
<script type="module">
  import { Niivue } from "https://cdn.jsdelivr.net/npm/@niivue/niivue@0.44.0/dist/index.min.js";
  const params = new URLSearchParams(location.search);
  const nv = new Niivue({ backColor:[0,0,0,1], show3Dcrosshair:false, crosshairColor:[0.78,0.35,0.12,1] });
  nv.attachTo("gl");
  const vols = [];
  if (params.get("ct"))  vols.push({ url: params.get("ct"),  colormap: "gray" });
  if (params.get("pet")) vols.push({ url: params.get("pet"), colormap: "warm", opacity: 0.65 });
  if (vols.length) {
    await nv.loadVolumes(vols);
    const mode = params.get("mode") || "mip";
    if (mode === "mip") nv.setSliceType(nv.sliceTypeRender), nv.setRenderAzimuthElevation(90, 0);
    else if (mode === "multi") nv.setSliceType(nv.sliceTypeMultiplanar);
    else nv.setSliceType(nv.sliceTypeRender);
    document.getElementById("sub").textContent = `niivue · ${vols.length} volume(s) · ${mode}`;
    document.getElementById("hint").style.display = "none";
  }
  document.getElementById("mode").onchange = (e) => {
    const v = e.target.value;
    nv.setSliceType(v === "multi" ? nv.sliceTypeMultiplanar : nv.sliceTypeRender);
    if (v === "mip") nv.setRenderAzimuthElevation(90, 0);
  };
  document.getElementById("dl").onclick = () => nv.saveScene("imaging.png");
</script>
</body>
</html>
